name: Run-Prunner
run-name: "Pruned Old Runs on ${{ github.repository }} by ${{ github.actor }} with ${{ github.event_name }} (Attempt ${{ github.run_attempt }})"

on:
  workflow_dispatch:
    inputs:
      keep-last:
        description: "Recent items to keep per workflow/key (0 = none)"
        type: string
        required: false
        default: '2'
      stale-minutes:
        description: "Grace window in minutes (skip items younger than this)"
        type: string
        required: false
        default: '7'
      dry-run:
        description: "Log only, do not delete"
        type: string
        required: false
        default: 'false'
  push:
    branches-ignore:
      - 'renovate/**'
      - 'dependabot/**'

permissions:
  actions: write
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-actions-prune"
  cancel-in-progress: false

jobs:
  prune:
    uses: Mimis-Gildi/fluffle/.github/workflows/actions-prune.yml@main
    with:
      keep-last: ${{ inputs.keep-last || '1' }}
      stale-minutes: ${{ inputs.stale-minutes || '3' }}
      dry-run: ${{ inputs.dry-run || 'false' }}
