github                      : [metadata]

### Site Metadata
title                       : Héra Verkstaðr
subtitle                    : natural leadership forge and armory
title_separator             : " - "
description                 : "A dedicated space for learning, exploring, experimenting, and testing."
email                       : 12781006+rdd13r@users.noreply.github.com
url                         : "https://gervi-hera-vitr.github.io"
baseurl                     : "/sindri-labs"
github_username             : Gervi-Hera-Vitr
twitter_username            : ""

locale                      : "en-US"
rtl                         : false
name                        : Gervi Héra Vitr
repository                  : Gervi-Hera-Vitr/sindri-labs
teaser                      : "/assets/images/site-image.png"
favicon                     : "/assets/images/favicon.png"
logo                        : "/assets/images/site-image.png"
masthead_title              : Héra Academy Laboratory
breadcrumbs                 : true
words_per_minute            : 300
enable_copy_code_button     : true
compress_html               : true

copyright                   : "© 2023–2025 Gervi Héra Vitr Labs. All rights reserved. Use with permission only."
copyright_url               : "https://github.com/Gervi-Hera-Vitr/sindri-labs"

# Theme and Styling
remote_theme                : "mmistakes/minimal-mistakes"
#minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
minimal_mistakes_skin       : "sunrise"

### Serve
port                        : 4400
livereload                  : true
livereload_port             : 34729
open_url                    : true
incremental                 : true
verbose                     : true

sass:
  quiet_deps                : true
  silence_deprecations:
    - import
safe                        : false


### AsciiDoc / Asciidoctor — site-wide attributes
asciidoctor:
  attributes:
    captain                 : 'https://github.com/CaptainLugaru[Captain,window=_blank]'
    munchkin                : 'http://www.catb.org/jargon/html/M/munchkin.html[munchkin,window=_blank]'
    rdd13r                  : 'https://github.com/rdd13r/[DaiDai,window=_blank]'
    american_literature     : 'link:/sindri-labs/literature/#american-literature[American Literature,window=_blank]'
    mathematics             : 'link:/sindri-labs/mathematics/[Mathematics,window=_blank]'
    on_mathematics          : 'link:/sindri-labs/on-mathematics/[On Mathematics,window=_blank]'


### Plugins
plugins:
  - jekyll-asciidoc
  - jekyll-data
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-paginate-v2
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-sitemap


### Pagination defaults
pagination:
  enabled                   : false


### Collections -- supporting content (linkable, not in the post feed)
collections:
  fragments:
    output                  : true
    permalink               : /fragments/:path/
  references:
    output                  : true
    permalink               : /references/:path/


### Defaults for posts (when you start adding them) and pages
defaults:
  - scope:
      path                  : ""
      type                  : posts
    values:
      layout                : single
      author_profile        : true
      read_time             : true
      comments              : false
      share                 : true
      related               : true
      breadcrumbs           : false
  - scope:
      path                  : ""
      type                  : pages
    values:
      author_profile        : true
  - scope:
      path                  : ""
      type                  : fragments
    values:
      layout                : single
      author_profile        : false
      read_time             : false
      comments              : false
      share                 : false
      related               : false
      breadcrumbs           : true
  - scope:
      path                  : ""
      type                  : references
    values:
      layout                : single
      author_profile        : false
      read_time             : false
      comments              : false
      share                 : false
      related               : false
      breadcrumbs           : true


### Reading Files
include:
  - _pages
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
keep_files:
  - .temp
encoding                    : "utf-8"


