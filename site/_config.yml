### Using feeds
atom_feed:
  hide                      : false
### Search Configuration
search                      : true
search_full_content         : true
search_provider             : lunr
lunr:
  search_within_pages       : true


# Social Sharing
og_image                    : assets/images/og-image.png
social:
  type                      : Organization
  name                      : "Gervi Héra Vitr"
  links:
    - "https://gervi-hera-vitr.github.io//sindri-labs"
    - "https://github.com/Gervi-Hera-Vitr/sindri-labs"


### GitHub Issues and Discussions for Comments
comments:
  provider                  : utterances
  utterances:
    theme                   : preferred-color-scheme
    issue_term              : title
    repo                    : Gervi-Hera-Vitr/sindri-labs
    label                   : comment



### School General Footer
footer:
